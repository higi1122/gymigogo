// ========== POINTS CALCULATION ==========
function calcPoints(rec) {
  if(rec.record_type !== 'workout') return 0;
  const cat = rec.category;
  
  if(cat === 'strength') {
    let pts = Math.round((rec.weight||0) * (rec.reps||0) * (rec.sets||1) / 200);
    return Math.min(7, Math.max(2, pts));
  }
  
  if(cat === 'cardio') {
    let pts = Math.round(parseDurationMin(rec.duration) * 0.6);
    return Math.min(30, Math.max(5, pts)); 
  }
  
  if(cat === 'hiit') {
    let pts = Math.round(parseDurationMin(rec.duration) * 1);
    return Math.min(30, Math.max(5, pts));
  }
  
  if(cat === 'functional') {
    let pts = 0;
    if (rec.duration) pts = Math.round(parseFloat(rec.duration) * 0.6);
    else pts = Math.round((rec.sets||1) * (rec.reps||1) * 0.5);
    return Math.min(30, Math.max(5, pts));
  }
  
  return 3; // 預設保底分數
}

function parseDurationMin(d) {
  if(!d) return 0;
  const p = d.split(':');
  return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60;
}

// 修改：支援 Admin 讀取及特別扣分/加分機制
function getTotalPoints(recordsArr = allRecords, rewardsArr = rewards) {
  let earned = 0, spent = 0;
  recordsArr.forEach(r => {
    // 運動得分 (必須非 planned 狀態)，或 Admin 手動調整嘅分數
    if((r.record_type === 'workout' && r.status !== 'planned') || r.record_type === 'point_adjustment') earned += (r.points || 0);
    // 換領扣分 (優先讀取記錄中寫死嘅 cost，防商店改價)
    if(r.record_type === 'redemption') spent += (r.cost !== undefined ? r.cost : (rewardsArr.find(rw=>rw.id===r.reward_id)?.cost || 0));
  });
  return { earned, spent, available: earned - spent };
}

async function doLogin() {
  const nameInput = document.getElementById('nameInput');
  const pwdInput = document.getElementById('pwdInput');
  const userId = nameInput.value.trim();
  const password = pwdInput ? pwdInput.value : '';
  const errorMsg = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  
  if(!userId || !password) {
    errorMsg.textContent = '請輸入帳號同密碼';
    errorMsg.classList.remove('hidden');
    return;
  }
  errorMsg.classList.add('hidden');
  
  // 繼續保留無感登入嘅魔法：如果用家無打 @，自動補齊 @gymigogo.com
  const email = userId.includes('@') ? userId : `${userId.toLowerCase()}@gymigogo.com`;
  
  btn.disabled = true;
  btn.textContent = '驗證中...';

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (error) {
    console.error(error);
    if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
      showToast('帳號或密碼錯誤', 'error');
    } else {
      showToast('登入失敗，請檢查網絡連線', 'error');
    }

    btn.textContent = '開始🚀';
  }
}

function doLogout() {

// 監聽登入狀態變化
auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    const displayId = user.displayName || user.email.split('@')[0];
    document.getElementById('userBadge').textContent = displayId;
    
    // --- 檢查是否 Admin，顯示按鈕 ---
    const isAdmin = user.email === 'adming@gymigogo.com';
    const navAdmin = document.getElementById('nav-admin');
    if(isAdmin) {
      navAdmin.classList.remove('hidden'); navAdmin.classList.add('flex');
    } else {
      navAdmin.classList.add('hidden'); navAdmin.classList.remove('flex');
    }

    // --- 儲存用戶資料俾 Admin 列表睇 ---
    db.collection("users").doc(user.uid).set({ displayId: displayId, email: user.email }, { merge: true });
    
    // --- 1. 優先載入系統全域預設 (System Defaults) ---
    try {
      const sysDoc = await db.collection("system").doc("defaults").get();
      if (sysDoc.exists) {
        if (sysDoc.data().exerciseData) globalExerciseData = sysDoc.data().exerciseData;
        if (sysDoc.data().rewards) globalRewardsData = sysDoc.data().rewards;
      }
    } catch(e) { console.error("加載系統預設失敗", e); }

    // 如果 Firebase 未有系統預設，就用 Hardcode 嗰套打底
    if(!globalExerciseData) globalExerciseData = JSON.parse(JSON.stringify(defaultExerciseData));
    if(!globalRewardsData) globalRewardsData = JSON.parse(JSON.stringify(defaultRewards));

    // --- 2. 載入個人專屬自訂清單及專屬商店 ---
    db.collection("users").doc(user.uid).collection("settings").doc("preferences").get().then(doc => {
      if (doc.exists && doc.data().exerciseData) exerciseData = doc.data().exerciseData;
      else exerciseData = JSON.parse(JSON.stringify(globalExerciseData)); // 繼承系統預設
    });

    db.collection("users").doc(user.uid).collection("settings").doc("rewards").get().then(doc => {
      if (doc.exists && doc.data().rewards) rewards = doc.data().rewards;
      else rewards = JSON.parse(JSON.stringify(globalRewardsData)); // 繼承系統預設
      if(currentPage === 'shop') renderShop();
    });

    // 實時載入資料庫數據
    if(recordsUnsubscribe) recordsUnsubscribe();
    recordsUnsubscribe = db.collection("users").doc(user.uid).collection("records")
      .onSnapshot(snapshot => {
        allRecords = snapshot.docs.map(doc => ({ ...doc.data(), __backendId: doc.id }));
        document.getElementById('totalPoints').textContent = getTotalPoints().available;
        if(currentPage !== 'admin') renderCurrentPage();
      });

    switchPage('calendar');
    lucide.createIcons();
} else {
    currentUser = null;
    if(recordsUnsubscribe) { recordsUnsubscribe(); recordsUnsubscribe = null; }
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    
    // 登出後重設登入按鈕狀態，並清空密碼
    const loginBtn = document.getElementById('loginBtn');
    if(loginBtn) { 
      loginBtn.disabled = false; 
      loginBtn.textContent = '開始旅程 🚀'; 
    }
    const pwdInput = document.getElementById('pwdInput');
    if(pwdInput) pwdInput.value = '';
  }
});

// ========== NAVIGATION ==========
function switchPage(page) {
  currentPage = page;
  
  const pages = ['calendar','shop','history','settings', 'admin'];
  pages.forEach(p => {
    // 1. 處理頁面顯示/隱藏
    const pageEl = document.getElementById('page-'+p);
    if(pageEl) pageEl.classList.add('hidden');
    
    // 2. 處理導航按鈕樣式
    const navEl = document.getElementById('nav-'+p);
    if(navEl) {
      // 獲取目前的 isAdmin 狀態
      const isAdmin = currentUser && currentUser.email === 'adming@gymigogo.com';
      
      // 如果不是 Admin 且是管理按鈕，必須保持隱藏
      if (p === 'admin' && !isAdmin) {
        navEl.className = 'hidden flex-col items-center gap-0.5 px-4 py-1 rounded-xl transition-all tab-inactive';
      } else {
        // 根據是否選中，切換 active/inactive
        const isActive = (p === page);
        navEl.className = `flex flex-col items-center gap-0.5 px-4 py-1 rounded-xl transition-all ${isActive ? 'tab-active' : 'tab-inactive'}`;
      }
    }
  });

  const selectedPageEl = document.getElementById('page-'+page);
  if(selectedPageEl) selectedPageEl.classList.remove('hidden');
  
  renderCurrentPage();
  lucide.createIcons();
}

function renderCurrentPage() {
  if(currentPage === 'calendar') renderCalendar();
  else if(currentPage === 'shop') renderShop();
  else if(currentPage === 'history') renderHistory();
  else if(currentPage === 'settings') renderSettings();
  else if(currentPage === 'admin') renderAdmin(); // 👈 補上這這一行
}

// ========== TOAST ==========
function showToast(msg, type='success') {
  const colors = { success: 'bg-green-400 text-white', error: 'bg-red-400 text-white', info: 'bg-blue-400 text-white' };
  const t = document.createElement('div');
  t.className = `toast-msg ${colors[type]||colors.info}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ========== MODAL ==========
function showModal(html) {
  document.getElementById('modalContainer').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

let clipboardMode = false;

function renderCalendar() {
  const el = document.getElementById('page-calendar');
  const workouts = allRecords.filter(r => r.record_type === 'workout');
  // Group by date
  const byDate = {};
  workouts.forEach(w => {
    if(!byDate[w.date]) byDate[w.date] = [];
    byDate[w.date].push(w);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

let calHtml = `<div class="relative flex items-center justify-center mb-3 min-h-[40px]">
    <div class="absolute left-0 flex gap-2">
      <button onclick="prevMonth()" class="p-2 rounded-xl bg-white shadow-sm hover:bg-sky2 transition flex items-center justify-center"><i data-lucide="chevron-left" class="w-5 h-5 text-primary"></i></button>
      <button onclick="goToToday()" class="px-3 py-1 rounded-xl bg-white shadow-sm hover:bg-sky2 transition text-primary font-bold text-sm flex items-center justify-center">今日</button>
    </div>
    <button onclick="window.openMonthPicker()" class="font-extrabold text-lg text-primary hover:bg-white/60 active:bg-white/80 px-3 py-1.5 rounded-xl transition flex items-center z-10">
      ${calYear}年 ${monthNames[calMonth]}
    </button>
    <div class="absolute right-0 flex items-center justify-center">
      <button onclick="nextMonth()" class="p-2 rounded-xl bg-white shadow-sm hover:bg-sky2 transition flex items-center justify-center"><i data-lucide="chevron-right" class="w-5 h-5 text-primary"></i></button>
    </div>
  </div>`;

  calHtml += '<div class="grid grid-cols-7 gap-1 mb-1 text-center">';
  ['日','一','二','三','四','五','六'].forEach(d => calHtml += `<div class="text-xs font-bold text-slate-400">${d}</div>`);
  calHtml += '</div><div class="grid grid-cols-7 gap-1">';

  for(let i=0; i<firstDay; i++) calHtml += '<div></div>';
  for(let d=1; d<=daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayWorkouts = byDate[dateStr] || [];
    const isToday = dateStr === toDateStr(new Date());
    const isSelected = dateStr === selectedDate;
    const hasFW = dayWorkouts.length > 0;

    // Get category tags with colors
    let allTags = [];
    if(dayWorkouts.length > 0) {
      const tagSet = new Set();
      dayWorkouts.forEach(w => {
        let label = '';
        let colorClass = '';
        
        // 判斷運動所屬分類及顏色
        if(w.category === 'strength') {
          for(const [sc, items] of Object.entries(exerciseData.strength.subcats)) {
            if(items.includes(w.exercise)) { label = sc; break; }
          }
          const subcatColors = { '胸': 'bg-red-100 text-red-700', '背': 'bg-cyan-100 text-cyan-700', '腿': 'bg-green-100 text-green-700', '肩': 'bg-yellow-100 text-yellow-700', '臂': 'bg-purple-100 text-purple-700', '腹': 'bg-stone-200 text-stone-700' };
          colorClass = subcatColors[label] || 'bg-blue-100 text-blue-700';
        } else {
          const labels = { cardio: '有氧', hiit: 'HIIT', functional: '功能性' };
          const colors = { cardio: 'bg-orange-100 text-orange-700', hiit: 'bg-pink-100 text-pink-700', functional: 'bg-indigo-100 text-indigo-700' };
          label = labels[w.category] || w.category;
          colorClass = colors[w.category] || 'bg-slate-100 text-slate-700';
        }

        if(label) {
          const isPlanned = w.status === 'planned';
          const uniqueKey = label + (isPlanned ? '_planned' : ''); // 區分計劃同完成
          
          if(!tagSet.has(uniqueKey)) {
            tagSet.add(uniqueKey);
            
           if (isPlanned) {
              // 📝 計劃中：扣減 1px 左右 padding (px-[3px]) 抵消邊框，達成「內框」效果
              allTags.push(`<span class="text-[10px] font-bold ${colorClass} border border-dashed border-current px-[3px] rounded-full whitespace-nowrap flex-shrink-0 opacity-80" style="padding-top: 1px; padding-bottom: 1px;">${label}</span>`);
            } else {
              // ✅ 已完成：還原最 Slim 嘅原本實色標籤 (無邊框)
              allTags.push(`<span class="text-[10px] font-bold ${colorClass} px-1 rounded-full whitespace-nowrap flex-shrink-0" style="padding-top: 2px; padding-bottom: 2px;">${label}</span>`);
            }
          }
        }
      });
    }

    // Dynamically fit tags based on available space
    // Create a temporary container to measure actual width
    let tagHtml = '';
    let totalWidth = 0;
    const maxWidth = 135; // Approximate width of cell - padding
    let displayCount = 0;
    
    for(let i = 0; i < allTags.length; i++) {
      // Each tag is roughly 24-28px wide, gap is 4px
      const tagWidth = 26 + 4;
      if(totalWidth + tagWidth > maxWidth && displayCount > 0) break;
      tagHtml += allTags[i];
      totalWidth += tagWidth;
      displayCount++;
    }
    
    const hiddenCount = allTags.length - displayCount;
    if(hiddenCount > 0) {
      tagHtml += `<span class="text-[10px] font-bold bg-slate-200 text-slate-600 px-1 py-0.5 rounded-full flex-shrink-0">+${hiddenCount}</span>`;
    }

    calHtml += `<button onclick="selectDate('${dateStr}')" oncontextmenu="return false;" class="rounded-xl p-1 h-20 flex flex-col items-start justify-start transition-all overflow-hidden ${isSelected?'bg-[#70a7ff] text-white shadow-md':isToday?'bg-sky2 ring-2 ring-primary':'bg-white hover:bg-[#f2faff]'} ${hasFW?'ring-1 ring-sky3':''} ${clipboardMode?'ring-1 ring-green-400 cursor-copy':''}">
      <span class="text-xs font-bold ${isSelected?'text-white':isToday?'text-primary':'text-slate-700'}">${d}</span>
      <div class="flex flex-wrap gap-0.5 mt-0.5 w-full overflow-hidden flex-1 content-start">${tagHtml}</div>
    </button>`;
  }
  calHtml += '</div>';

  // Selected date detail
  let detailHtml = '';
  if(selectedDate) {
    const dayW = byDate[selectedDate]||[];
    detailHtml = `<div class="mt-4 bg-white rounded-2xl shadow-sm p-4 card-enter">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-primary text-lg">${selectedDate}</h3>
        <div class="flex gap-2">
          <button onclick="openAddWorkout('${selectedDate}')" class="bg-primary text-white px-3 py-1.5 rounded-xl text-sm font-bold flex items-center gap-1 hover:bg-primaryDk transition">
            <i data-lucide="plus" class="w-4 h-4"></i> 新增
          </button>
          ${clipboardMode ? `<button onclick="cancelClipboard()" class="bg-slate-200 text-slate-600 px-3 py-1.5 rounded-xl text-sm font-bold hover:bg-slate-300 transition">取消複製</button>` : ''}
        </div>
      </div>`;
    if(dayW.length === 0) {
      detailHtml += '<p class="text-slate-400 text-sm text-center py-6">呢日冇訓練記錄 📝</p>';
    } else {
      // Group by category
      const byCategory = {};
      dayW.forEach(w => {
        if(!byCategory[w.category]) byCategory[w.category] = [];
        byCategory[w.category].push(w);
      });

      // Sort categories
      const catOrder = ['strength', 'cardio', 'hiit', 'functional'];
      catOrder.forEach(cat => {
        if(!byCategory[cat]) return;
        const items = byCategory[cat];
        const catLabel = { strength: '💪 力量', cardio: '🏃 有氧', hiit: '🔥 HIIT', functional: '🧘 功能性' }[cat];
        detailHtml += `<div class="mb-3"><div class="text-xs font-bold text-slate-400 mb-1.5">${catLabel}</div>`;

        items.forEach(w => {
          let subcatDisplay = '';
          let cardBgClass = 'bg-sky1 hover:bg-sky2';
          let textColorClass = 'text-slate-900';
          
          if(w.category === 'strength') {
            for(const [sc, exList] of Object.entries(exerciseData.strength.subcats)) {
              if(exList.includes(w.exercise)) {
const subcatColors = { '胸': 'bg-red-100 text-red-700', '背': 'bg-cyan-100 text-cyan-700', '腿': 'bg-green-100 text-green-700', '肩': 'bg-yellow-100 text-yellow-700', '臂': 'bg-purple-100 text-purple-700', '腹': 'bg-stone-200 text-stone-700' };               subcatDisplay = `<span class="text-xs font-semibold ${subcatColors[sc]||'bg-blue-100 text-blue-700'} px-2 py-0.5 rounded-full">${sc}</span>`;
                break;
              }
            }
          } else if(w.category === 'cardio') {
            cardBgClass = 'bg-orange-100 hover:bg-orange-200';
            textColorClass = 'text-orange-900';
          } else if(w.category === 'hiit') {
            cardBgClass = 'bg-pink-100 hover:bg-pink-200';
            textColorClass = 'text-pink-900';
          } else if(w.category === 'functional') {
            cardBgClass = 'bg-indigo-100 hover:bg-indigo-200';
            textColorClass = 'text-indigo-900';
          }
          
          let linkBtnHtml = '';
          if (['cardio', 'hiit', 'functional'].includes(w.category) && w.link) {
            let safeLink = w.link.trim();
            if(safeLink && !safeLink.startsWith('http')) safeLink = 'https://' + safeLink;
            linkBtnHtml = `<a href="${safeLink}" target="_blank" onclick="event.stopPropagation()" class="inline-flex items-center gap-1 text-[11px] font-bold bg-white/60 text-slate-700 px-2 py-0.5 rounded-lg hover:bg-white hover:text-primary transition shadow-sm border border-slate-200">
              <i data-lucide="external-link" class="w-3 h-3"></i> 影片
            </a>`;
          }

        // 判斷是否為「計劃」狀態
          let finalCardBg = w.status === 'planned' ? 'bg-slate-50 border-2 border-dashed border-slate-300' : cardBgClass;
          let finalTextColor = w.status === 'planned' ? 'text-slate-500' : textColorClass;

        detailHtml += `<div class="w-full text-left ${finalCardBg} rounded-xl p-3 mb-2 flex items-start justify-between transition-colors ${finalTextColor}">
            <button 
              ontouchstart="window.handlePressStart(event, '${w.__backendId}')" 
              ontouchend="window.handlePressEnd()" 
              ontouchmove="window.handlePressEnd()" 
              onmousedown="window.handlePressStart(event, '${w.__backendId}')" 
              onmouseup="window.handlePressEnd()" 
              onmouseleave="window.handlePressEnd()" 
              onclick="window.handleRecordClick(event, '${w.__backendId}')" 
              oncontextmenu="event.preventDefault();" 
              class="flex-1 flex items-start gap-2 border-none bg-none cursor-pointer text-left select-none" 
              style="-webkit-touch-callout: none;">              
              
    ${subcatDisplay ? `<div class="flex-shrink-0 mt-0.5 ${w.status==='planned'?'opacity-50':''}">${subcatDisplay}</div>` : ''}
              <div class="flex-1">
                <div class="font-bold text-sm flex items-center gap-1">${w.status==='planned'?'📝 ':''}${w.exercise}</div>
                <div class="text-xs opacity-75 mt-1">${formatWorkoutDetail(w)}</div>
              </div>
            </button>
            <div class="flex flex-col items-end gap-1.5 flex-shrink-0 ml-2">
              <div class="flex items-center gap-1">
                ${linkBtnHtml}
                ${w.status === 'planned'
                  ? `<span class="text-[10px] font-bold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-full whitespace-nowrap">預計 +${w.points}⭐</span>`
                  : `<span class="text-xs font-bold text-warm3 bg-warm1 px-2 py-0.5 rounded-full whitespace-nowrap">+${w.points}⭐</span>`
                }
              </div>
              ${(w.status === 'planned' && selectedDate <= toDateStr(new Date()))
                ? `<button onclick="event.stopPropagation(); window.markAsCompleted('${w.__backendId}')" class="bg-green-500 hover:bg-green-600 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg transition shadow-sm flex items-center gap-1 mt-1"><i data-lucide="check-circle" class="w-3 h-3"></i> 完成</button>`
                : ''
              }
            </div>
          </div>`;
        });
        detailHtml += '</div>';
      });
    }
    detailHtml += '</div>';
  }

  el.innerHTML = calHtml + detailHtml;
  lucide.createIcons();
}

function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} selectedDate=null; renderCalendar(); }
function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} selectedDate=null; renderCalendar(); }
// 新增：返去今日嘅功能
function goToToday() {
  const d = new Date();
  calYear = d.getFullYear();
  calMonth = d.getMonth();
  selectedDate = toDateStr(d); // 自動揀埋今日，顯示今日嘅詳情
  renderCalendar();
}

// 新增：選擇月份彈出視窗

  let html = `<div class="modal-box" onclick="event.stopPropagation()">
    <h3 class="font-extrabold text-lg text-primary mb-4">📅 選擇年月</h3>
    <div class="flex gap-2 mb-4">
      <select id="jumpYear" class="flex-1 border-2 border-sky2 rounded-xl px-2 py-3 font-extrabold text-primary focus:border-primary focus:outline-none text-center bg-white">

};

window.confirmMonthJump = () => {
  calYear = parseInt(document.getElementById('jumpYear').value);
  calMonth = parseInt(document.getElementById('jumpMonth').value);
  selectedDate = null;
  closeModal();
  renderCalendar();
};

function selectDate(d) { 
  if(clipboardMode && clipboardWorkout) {
    pasteWorkout(d);
    return;
  }
  selectedDate = selectedDate===d ? null : d; 
  renderCalendar(); 
}

function formatWorkoutDetail(w) {
  if(w.category==='strength') return `${w.sets||1} 組 × ${w.reps||0} 次 @ ${w.weight||0}kg`;
  if(w.category==='cardio') {
    let durStr = w.duration ? (String(w.duration).includes(':') ? w.duration : w.duration + ' 分鐘') : '0 分鐘';
    let s = durStr;
    if(w.distance) s += ` | ${w.distance}km`;
    if(w.level) s += ` | Lv.${w.level}`;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
  if(w.category==='hiit') {
    let durStr = w.duration ? (String(w.duration).includes(':') ? w.duration : w.duration + ' 分鐘') : '0 分鐘';
    let s = durStr;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
if(w.category==='functional') {
    let s = w.duration ? (w.duration + ' 分鐘') : `${w.sets||1} 組 × ${w.reps||0} 次`;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
  return '';
}

// ========== CLIPBOARD FUNCTIONS ==========
let pressTimer = null;
let isLongPress = false;

window.handlePressStart = (e, backendId) => {
  isLongPress = false;
  if (pressTimer) clearTimeout(pressTimer);
  pressTimer = setTimeout(() => {
    isLongPress = true;
    // 觸發微震動回饋 (如果手機支援)
    if (navigator.vibrate) navigator.vibrate(50);
    showWorkoutMenu(e, backendId);
  }, 600); // 600毫秒當作長按
};

window.handlePressEnd = () => {
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
};

window.handleRecordClick = (e, backendId) => {
  if (isLongPress) {
    e.preventDefault();
    e.stopPropagation();
    return; // 如果係長按，就唔好觸發編輯
  }
  editRecord(backendId);
};

function showWorkoutMenu(e, backendId) {
  e.preventDefault();
  e.stopPropagation();
  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) return;

  showModal(`<div class="modal-box" onclick="event.stopPropagation()">
    <h3 class="font-bold text-lg text-primary mb-4 text-center">${rec.exercise}</h3>
    <div class="space-y-2">
      <button onclick="copyWorkout('${backendId}')" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
        <i data-lucide="copy" class="w-5 h-5"></i> 複製此記錄
      </button>
      <button onclick="copyDayWorkouts('${rec.date}')" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
        <i data-lucide="copy-check" class="w-5 h-5"></i> 複製全日記錄
      </button>
      <button onclick="deleteRecord('${backendId}')" class="w-full bg-red-50 hover:bg-red-100 text-red-500 font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
        <i data-lucide="trash-2" class="w-5 h-5"></i> 刪除
      </button>
      <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-200 transition">取消</button>
    </div>
  </div>`);
  lucide.createIcons();
}

function copyWorkout(backendId) {
  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) return;
  
  clipboardWorkout = [rec]; // 變成陣列儲存
  clipboardMode = true;
  closeModal();
  showToast('已複製！按日曆日子粘貼', 'success');
  renderCalendar();
}

function copyDayWorkouts(dateStr) {
  const dayRecs = allRecords.filter(r => r.record_type === 'workout' && r.date === dateStr);
  if(dayRecs.length === 0) return;
  
  clipboardWorkout = dayRecs; // 將嗰日所有記錄變成陣列儲存
  clipboardMode = true;
  closeModal();
  showToast(`已複製 ${dayRecs.length} 筆記錄！按日子粘貼`, 'success');
  renderCalendar();
}

function cancelClipboard() {
  clipboardMode = false;
  clipboardWorkout = null;
  showToast('已取消複製', 'info');
  renderCalendar();
}

async function pasteWorkout(dateStr) {
  if(!clipboardWorkout || clipboardWorkout.length === 0) return;
  
  const btn = document.querySelector('button:hover') || document.body;
  if(btn) btn.style.opacity = '0.7';

  const currentCount = allRecords.filter(r=>r.record_type==='workout').length;
  if(currentCount + clipboardWorkout.length >= 9999) {
    showToast('已達記錄上限 (9999)！', 'error');
    if(btn) btn.style.opacity = '1';
    return;
  }

  try {
    // 將所有要 Copy 嘅記錄準備成 Promise Array
    const todayStr = toDateStr(new Date());
    const isFuture = dateStr > todayStr;
    
    const promises = clipboardWorkout.map(srcRec => {
      const newRec = {
        record_type: 'workout',
        date: dateStr,
        category: srcRec.category,
        exercise: srcRec.exercise,
        weight: srcRec.weight || 0,
        reps: srcRec.reps || 0,
        sets: srcRec.sets || 1,
        duration: srcRec.duration || '',
        distance: srcRec.distance || 0,
        level: srcRec.level || 0,
        notes: srcRec.notes || '',
        points: srcRec.points || 0,
        reward_id: '', used: false, redeemed_at: '',
        user_name: currentUser ? (currentUser.displayName || currentUser.email.split('@')[0]) : '',
        font_size: 0, status: isFuture ? 'planned' : (srcRec.status || 'completed') // 👈 貼去未來日子強制轉做計劃
      };
      // 加入 Firebase 寫入隊列
      return db.collection("users").doc(currentUser.uid).collection("records").add(newRec);
    });

    // 執行批量寫入 (併發處理，速度極快)
    await Promise.all(promises);
    
    if(btn) btn.style.opacity = '1';
    showToast(`成功粘貼 ${clipboardWorkout.length} 筆記錄！`, 'success');
    clipboardMode = false;
    clipboardWorkout = null;
    selectedDate = dateStr;
    renderCalendar();
  } catch (e) {
    console.error(e);
    showToast('粘貼失敗，請檢查網絡', 'error');
    if(btn) btn.style.opacity = '1';
  }
}

// ========== ADD WORKOUT ==========
function openAddWorkout(date) {
  let selCat = 'strength', selSubcat = '', selExercise = '';
  let isExEditMode = false; // 追蹤是否正在編輯清單

  // 切換編輯模式
  window._toggleExEdit = () => { isExEditMode = !isExEditMode; renderAdd(); };
  
  // 刪除項目
  window._deleteEx = (ex) => {
    if(!confirm(`確定要刪除「${ex}」？`)) return;
    exerciseData[selCat].subcats[selSubcat] = exerciseData[selCat].subcats[selSubcat].filter(e => e !== ex);
    if(selExercise === ex) selExercise = '';
    saveCustomExercises(); // 同步到 Firebase
    renderAdd();
  };
  
  // 新增項目
  window._addNewEx = () => {
    const name = prompt('請輸入新動作名稱：');
    if(!name || !name.trim()) return;
    const trimmed = name.trim();
    if(exerciseData[selCat].subcats[selSubcat].includes(trimmed)) { showToast('項目已存在', 'error'); return; }
    exerciseData[selCat].subcats[selSubcat].push(trimmed);
    selExercise = trimmed;
    saveCustomExercises(); // 同步到 Firebase
    renderAdd();
  };

  function renderAdd() {
    const catData = exerciseData[selCat];
    const subcats = Object.keys(catData.subcats);
    if(!selSubcat || !catData.subcats[selSubcat]) selSubcat = subcats[0];
    const exercises = catData.subcats[selSubcat];
    if(!selExercise || !exercises.includes(selExercise)) selExercise = '';

    let html = `<div class="modal-box max-w-md" onclick="event.stopPropagation()" style="max-height:90%; overflow-y:auto;">
      <h3 class="font-extrabold text-lg text-primary mb-3">📝 新增訓練 - ${date}</h3>
      
      <div class="flex gap-2 overflow-x-auto pb-2 mb-3">`;
// 1. 強制主分類排序
    const mainCatOrder = ['strength', 'cardio', 'hiit', 'functional'];
    mainCatOrder.forEach(k => {
      const v = exerciseData[k];

function inputField(id, label, type, val, ph) {
  // 如果係數字框，就渲染成 [-] 輸入框 [+] 嘅樣式
  if (type === 'number') {
    // 智能判斷每次加減嘅幅度 (Step)
    let step = 1;
    if (id.includes('weight')) step = 2.5; // 重量預設每次加 2.5kg
    else if (id.includes('distance')) step = 0.5; // 距離預設加 0.5km
    else if (id.includes('duration')) step = 5; // 時間每次加減 5 分鐘
    
    return `<div>
      <label class="text-xs font-bold text-slate-500 block mb-1">${label}</label>
      <div class="flex items-center shadow-sm rounded-xl overflow-hidden border-2 border-sky2 focus-within:border-primary focus-within:ring-2 focus-within:ring-sky1 transition-all bg-white">
        <button type="button" onclick="window._stepInput('add_${id}', -${step})" class="w-12 h-12 flex-shrink-0 flex items-center justify-center bg-sky1 text-primary font-extrabold text-2xl hover:bg-sky2 active:bg-sky3 transition touch-none select-none">-</button>
        <input id="add_${id}" type="number" value="${val}" placeholder="${ph}" step="any" class="w-full h-12 px-2 text-center focus:outline-none font-extrabold text-slate-700 bg-white text-lg">
        <button type="button" onclick="window._stepInput('add_${id}', ${step})" class="w-12 h-12 flex-shrink-0 flex items-center justify-center bg-sky1 text-primary font-extrabold text-2xl hover:bg-sky2 active:bg-sky3 transition touch-none select-none">+</button>
      </div>
    </div>`;
  }
  
  // 如果係普通文字框 (例如備註/連結)，保持原樣
  return `<div><label class="text-xs font-bold text-slate-500 block mb-1">${label}</label>
    <input id="add_${id}" type="${type}" value="${val}" placeholder="${ph}" class="w-full border-2 border-sky2 rounded-xl px-3 py-3 focus:border-primary focus:outline-none transition font-semibold shadow-sm"></div>`;
}

// 處理 +/- 按鈕點擊事件
window._stepInput = (id, delta) => {
  const input = document.getElementById(id);
  if(!input) return;
  // 攞現有數值，如果係吉嘅就當係 0
  let val = parseFloat(input.value) || 0;
  val += delta;
  if(val < 0) val = 0; // 防止變負數
  
  // 解決 JavaScript 小數點加減誤差 (例如 0.1 + 0.2 = 0.300000004)
  input.value = parseFloat(val.toFixed(2));
  
  // 觸發微震動 (手機手感更好)
  if (navigator.vibrate) navigator.vibrate(20);
};

async function submitWorkout(date, cat, exercise, status = 'completed') {
  const btn = document.getElementById('submitWorkoutBtn');
  const pBtn = document.getElementById('planWorkoutBtn');
  
  if(btn) btn.disabled = true;
  if(pBtn) pBtn.disabled = true;

  if(allRecords.filter(r=>r.record_type==='workout').length >= 9999) {
    showToast('已達記錄上限 (9999)！請刪除一些舊記錄', 'error');
    if(btn) btn.disabled = false;
    if(pBtn) pBtn.disabled = false;
    return;
  }

  const gv = id => { const e = document.getElementById('add_'+id); return e ? e.value : ''; };
  const rec = {
    record_type: 'workout', date, category: cat, exercise,
    weight: parseFloat(gv('weight'))||0, reps: parseInt(gv('reps'))||0, sets: parseInt(gv('sets'))||1,
    duration: gv('duration')||'', distance: parseFloat(gv('distance'))||0, level: parseInt(gv('level'))||0,
    notes: gv('notes')||'', link: gv('link')||'', // 👈 新增 link
    points: 0, reward_id:'', used: false, redeemed_at:'', user_name: currentUser ? (currentUser.displayName || currentUser.email.split('@')[0]) : '',
    font_size: 0, status: status // 👈 加入狀態：planned 或 completed
  };
  rec.points = calcPoints(rec);

  await db.collection("users").doc(currentUser.uid).collection("records").add(rec);
  const result = { isOk: true };
  if(result.isOk) {
    closeModal();
    if(status === 'planned') showToast('📝 計劃已建立！', 'success');
    else showToast(`+${rec.points}⭐ 已記錄！`, 'success');
  } else {
    showToast('儲存失敗，請重試', 'error');
    if(btn) btn.disabled = false;
    if(pBtn) pBtn.disabled = false;
  }
}

function renderHistory() {
  const el = document.getElementById('page-history');
  // 修改：同時讀取運動記錄 (workout) 同 積分調整 (point_adjustment)
  const historyItems = allRecords.filter(r => r.record_type === 'workout' || r.record_type === 'point_adjustment')
    .sort((a,b) => {
      if(b.date !== a.date) return b.date.localeCompare(a.date);
      return (b.timestamp || '').localeCompare(a.timestamp || '');
    });

  let html = `<div class="flex items-center justify-between mb-3">
    <h2 class="font-extrabold text-xl text-primary">📋 訓練記錄</h2>
    ${historyItems.filter(r=>r.record_type==='workout').length > 0 ? `<button onclick="toggleHistoryEditMode()" class="text-sm font-bold px-3 py-1.5 rounded-lg transition-all ${historyEditMode?'bg-red-500 text-white':'bg-sky2 text-primary'}">${historyEditMode?'完成':'編輯'}</button>` : ''}
  </div>`;

  if(historyEditMode && selectedRecords.size > 0) {
    html += `<div class="bg-blue-50 rounded-xl p-3 mb-3 flex items-center justify-between">
      <span class="text-sm font-bold text-primary">已選擇 ${selectedRecords.size} 筆</span>
      <div class="flex gap-2">
        <button onclick="batchChangeDate()" class="text-xs font-bold bg-primary text-white px-3 py-1.5 rounded-lg hover:bg-primaryDk transition">修改日期</button>

      </div>
    </div>`;
  }

  if(historyItems.length === 0) {
    html += '<div class="text-center py-12 text-slate-400"><div class="text-4xl mb-2">📝</div><p class="font-semibold">暫時冇記錄</p></div>';
  } else {
    // Group by date
    const grouped = {};
    historyItems.forEach(w => {
      if(!grouped[w.date]) grouped[w.date] = [];
      grouped[w.date].push(w);
    });

    Object.entries(grouped).forEach(([date, items]) => {
      html += `<div class="mb-4 bg-white rounded-2xl shadow-sm p-4 card-enter"><div class="text-xs font-bold text-slate-400 mb-3">${date}</div>`;
      
      items.forEach(w => {
        if(w.record_type === 'point_adjustment') {
          // --- 顯示 Admin 嘅積分調整 (唯讀) ---
          const isPos = w.points >= 0;
          html += `<div class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 mb-2 flex justify-between items-center opacity-80">
            <div class="flex items-center gap-2">
              <span class="text-lg">⚖️</span>
              <div>
                <div class="font-bold text-sm text-slate-700">系統積分調整</div>
                <div class="text-[10px] text-slate-400">備註: ${w.notes || '無'}</div>
              </div>
            </div>
            <span class="text-xs font-bold ${isPos?'text-green-600':'text-red-500'}">${isPos?'+':''}${w.points}⭐</span>
          </div>`;
        } else {
          // --- 顯示普通運動記錄 (原本邏輯) ---
          let subcatDisplay = '';
          let cardBgClass = 'bg-sky1 hover:bg-sky2';
          let textColorClass = 'text-slate-900';
          
          for(const [sc, exList] of Object.entries(exerciseData.strength.subcats)) {
            if(exList.includes(w.exercise)) {
const subcatColors = { '胸': 'bg-red-100 text-red-700', '背': 'bg-cyan-100 text-cyan-700', '腿': 'bg-green-100 text-green-700', '肩': 'bg-yellow-100 text-yellow-700', '臂': 'bg-purple-100 text-purple-700', '腹': 'bg-stone-200 text-stone-700' };
              subcatDisplay = `<span class="text-xs font-semibold ${subcatColors[sc]||'bg-blue-100 text-blue-700'} px-2 py-0.5 rounded-full flex-shrink-0">${sc}</span>`;
              break;
            }
          }
          if(w.category === 'cardio') { cardBgClass = 'bg-orange-100 hover:bg-orange-200'; textColorClass = 'text-orange-900'; }
          else if(w.category === 'hiit') { cardBgClass = 'bg-pink-100 hover:bg-pink-200'; textColorClass = 'text-pink-900'; }
          else if(w.category === 'functional') { cardBgClass = 'bg-indigo-100 hover:bg-indigo-200'; textColorClass = 'text-indigo-900'; }
          
          let finalCardBg = w.status === 'planned' ? 'bg-slate-50 border-2 border-dashed border-slate-300' : cardBgClass;
          let finalTextColor = w.status === 'planned' ? 'text-slate-500' : textColorClass;
          
          const isSelected = selectedRecords.has(w.__backendId);
          
          html += `<div class="w-full text-left ${finalCardBg} rounded-xl p-3 mb-2 flex items-start justify-between transition-all ${finalTextColor} ${isSelected?'ring-4 ring-blue-500':''}${historyEditMode?'':' hover:shadow-md'}" onclick="${historyEditMode?`event.stopPropagation();toggleRecordSelect('${w.__backendId}')`:''}" style="cursor:${historyEditMode?'pointer':'default'}">
            <button onclick="${historyEditMode?'event.stopPropagation();return false':''}editRecord('${w.__backendId}')" class="flex-1 flex items-start gap-2 border-none bg-none cursor-pointer text-left ${historyEditMode?'pointer-events-none':''}">
              ${subcatDisplay ? `<div class="flex-shrink-0 mt-0.5 ${w.status==='planned'?'opacity-50':''}">${subcatDisplay}</div>` : ''}
              <div class="flex-1">
                <div class="font-bold text-sm flex items-center gap-1">${w.status==='planned'?'📝 ':''}${w.exercise}</div>
                <div class="text-xs opacity-75 mt-1">${formatWorkoutDetail(w)}</div>

            </button>
            ${w.status === 'planned'
              ? `<span class="text-[10px] font-bold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-full whitespace-nowrap">預計 +${w.points}⭐</span>`

            }
          </div>`;
        }
      });
      html += '</div>';
    });
  }
  el.innerHTML = html;
  lucide.createIcons();
}

function toggleHistoryEditMode() {
  historyEditMode = !historyEditMode;
  selectedRecords.clear();
  renderHistory();
}

function toggleRecordSelect(backendId) {
  // 唔俾選中 point_adjustment，因為佢哋唔可以被刪除或改期
  const rec = allRecords.find(r => r.__backendId === backendId);
  if (rec && rec.record_type === 'point_adjustment') return;

  if(selectedRecords.has(backendId)) {
    selectedRecords.delete(backendId);
  } else {
    selectedRecords.add(backendId);
  }
  renderHistory();
}

    html += inputField('edit_sets', '組數', 'number', rec.sets, '');
} else if(rec.category === 'cardio') {

    // 智能判斷：如果係一般運動（例如羽毛球），就隱藏距離同阻力
    const isOutdoor = exerciseData.cardio.subcats['一般運動']?.includes(rec.exercise);
    if(!isOutdoor) {
      html += inputField('edit_distance', '距離 (km)', 'number', rec.distance, '');
      html += inputField('edit_level', '阻力等級', 'number', rec.level, '');
    }
    
    html += inputField('edit_notes', '備註', 'text', rec.notes||'', '');
    // (有氧運動預設不需要影片連結，所以刪除 edit_link)
  } else if(rec.category === 'hiit') {
    html += inputField('edit_duration', '時間 (分鐘)', 'number', rec.duration, '');
    html += inputField('edit_notes', '備註', 'text', rec.notes||'', '');
    html += inputField('edit_link', '連結', 'text', rec.link||'', '');
} else {

      html += inputField('edit_duration', '時間 (分鐘)', 'number', rec.duration, '');

      html += inputField('edit_sets', '組數', 'number', rec.sets, '');
      html += inputField('edit_reps', '次數', 'number', rec.reps, '');
    }
    html += inputField('edit_notes', '備註', 'text', rec.notes||'', '');
    html += inputField('edit_link', '連結', 'text', rec.link||'', '');
  }

  // 判斷是否顯示「還原為計劃」按鈕
  let footerBtns = `<button id="saveEditBtn" onclick="saveEdit('${backendId}')" class="w-full mt-4 bg-primary hover:bg-primaryDk text-white font-bold py-3 rounded-xl transition">儲存修改 ✅</button>`;
  
  if (rec.status === 'completed') {
    footerBtns = `<div class="flex gap-2 mt-4">
      <button onclick="window.revertToPlanned('${backendId}')" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold py-3 rounded-xl transition">還原為計劃 📝</button>

    </div>`;

  html += `</div>

    setV('add_edit_weight', rec.weight); setV('add_edit_reps', rec.reps); setV('add_edit_sets', rec.sets);
    setV('add_edit_duration', rec.duration); setV('add_edit_distance', rec.distance);
    setV('add_edit_level', rec.level); setV('add_edit_notes', rec.notes); setV('add_edit_link', rec.link);
  }, 50);
}

async function saveEdit(backendId) {
  const btn = document.getElementById('saveEditBtn');
  if(btn) { btn.disabled = true; btn.textContent = '儲存中...'; }

  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) { closeModal(); return; }

  const gv = id => { const e = document.getElementById('add_edit_'+id); return e ? e.value : ''; };
  const updated = {...rec,
    weight: parseFloat(gv('weight'))||0, reps: parseInt(gv('reps'))||0, sets: parseInt(gv('sets'))||1,
    duration: gv('duration')||rec.duration, distance: parseFloat(gv('distance'))||0,
    level: parseInt(gv('level'))||0, notes: gv('notes')||'', link: gv('link')||'',
    status: rec.status || 'completed' // 👈 保留原本狀態
  };
  updated.points = calcPoints(updated);

  await db.collection("users").doc(currentUser.uid).collection("records").doc(backendId).update(updated);
  const result = { isOk: true };
  closeModal();
  if(result.isOk) showToast('已更新！', 'success');
  else showToast('更新失敗', 'error');
}

async function adminSubmitPoints() {
  const pts = parseInt(document.getElementById('adminPointsInput').value);
  const notes = document.getElementById('adminPointsNote').value || '系統調整';
  if(isNaN(pts)) return;
  const rec = { record_type: 'point_adjustment', date: toDateStr(new Date()), points: pts, notes: notes, timestamp: new Date().toISOString() };
  await db.collection("users").doc(adminSelectedUid).collection("records").add(rec);
  closeModal(); showToast('積分已調整', 'success'); selectAdminUser(adminSelectedUid);
}

// -- Admin: 重新計算歷史積分 --
window.adminRecalculatePoints = async () => {
  if(!confirm('⚠️ 確定要根據最新公式，重新計算呢位用戶所有歷史運動記錄嘅分數？\n(注意：此動作將會覆蓋舊分數，無法復原)')) return;
  
  const btn = document.querySelector('button:active') || document.body;
  btn.style.opacity = '0.5';
  showToast('正在逐筆重新計算中...', 'info');

  try {
    let updatedCount = 0;
    // 搵出該用戶所有運動記錄 (不包括換領或系統加減分)
    const workouts = adminSelectedUserRecs.filter(r => r.record_type === 'workout');
    
    for(const w of workouts) {
      const newPoints = calcPoints(w);
      // 如果新計出嚟嘅分 同 舊分唔同，就 Update 落 Firebase
      if(w.points !== newPoints) {
        await db.collection("users").doc(adminSelectedUid).collection("records").doc(w.__backendId).update({ points: newPoints });
        updatedCount++;
      }
    }
    
    btn.style.opacity = '1';
    showToast(`✅ 成功重算！共修正了 ${updatedCount} 筆記錄`, 'success');
    selectAdminUser(adminSelectedUid); // 重新載入資料並刷新畫面
  } catch(e) {
    console.error(e);
    showToast('重算失敗，請檢查網絡', 'error');
    btn.style.opacity = '1';
  }
};

window._adminNewReward = () => {
  const name = prompt('獎勵名稱 (例如: 咖啡):'); if(!name) return;
  const emoji = prompt('Emoji (例如: ☕):') || '🎁';
  const cost = parseInt(prompt('所需積分 (例如: 50):')); if(isNaN(cost)) return;
  adminSelectedUserRewards.push({ id: 'r'+Date.now(), name, emoji, cost, desc: '管理員自訂獎勵' });

};

window._adminEditReward = (id) => {
  const rw = adminSelectedUserRewards.find(r => r.id === id);
  if(!rw) return;
  const newName = prompt('修改獎勵名稱:', rw.name);
  if(!newName || !newName.trim()) return;
  const newEmoji = prompt('修改 Emoji:', rw.emoji) || '🎁';
  const costStr = prompt('修改所需積分:', rw.cost);
  if(costStr === null) return;
  const newCost = parseInt(costStr);
  if(isNaN(newCost)) return;

  rw.name = newName.trim();
  rw.emoji = newEmoji;
  rw.cost = newCost;
  adminSaveRewardsToDB();
};

window._adminDeleteReward = (id) => {
  if(!confirm('確定刪除此獎勵？')) return;
  adminSelectedUserRewards = adminSelectedUserRewards.filter(r => r.id !== id);
  adminSaveRewardsToDB();
};

function adminViewVouchersModal() {
  const reds = adminSelectedUserRecs.filter(r => r.record_type === 'redemption').sort((a,b) => b.redeemed_at.localeCompare(a.redeemed_at));
  let html = `<div class="modal-box max-w-md text-left" onclick="event.stopPropagation()" style="max-height:85%;overflow-y:auto;">
    <h3 class="font-extrabold text-lg text-primary mb-3">🎫 換領歷史及票券</h3>`;
  if(reds.length===0) html += `<p class="text-center text-slate-400 py-4">無記錄</p>`;
  reds.forEach(r => {
    const isUsed = r.used;
    const rwName = r.name || '已下架獎勵'; const rwEmoji = r.emoji || '🎁';
    const dateStr = new Date(r.redeemed_at).toLocaleDateString('zh-HK');
    html += `<div class="${isUsed?'bg-slate-100':'bg-green-100 border border-green-300'} rounded-xl p-3 mb-2 flex justify-between items-center">
      <div>
        <div class="font-bold text-sm flex items-center gap-1"><span class="text-lg">${rwEmoji}</span> ${rwName}</div>
        <div class="text-[10px] text-slate-500 mt-1">換領於: ${dateStr}</div>
      </div>
      <span class="text-xs font-bold px-2 py-1 rounded-full ${isUsed?'bg-slate-200 text-slate-500':'bg-green-500 text-white'}">${isUsed?'已使用':'未使用'}</span>
    </div>`;
  });
  html += `<button onclick="closeModal()" class="w-full mt-4 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-200 transition">關閉</button></div>`;
  showModal(html);
}

// Apply saved font size
const savedFontSize = parseInt(localStorage.getItem('gq_fontsize'))||16;
document.body.style.fontSize = savedFontSize + 'px';

// --- 系統全域預設寫入功能 (Admin Only) ---
window._adminSetGlobalExercises = async () => {
  if(!confirm('確定要將你目前嘅「自訂訓練清單」設為全系統預設？\n\n所有新註冊或重設嘅用戶將會套用呢個清單。')) return;
  try {
    await db.collection("system").doc("defaults").set({ exerciseData: exerciseData }, { merge: true });
    globalExerciseData = JSON.parse(JSON.stringify(exerciseData));
    showToast('✅ 成功更新系統預設訓練！', 'success');
  } catch(e) { console.error(e); showToast('更新失敗，請檢查 Firebase 權限', 'error'); }
};

window._adminSetGlobalShop = async () => {
  if(!confirm('確定要將目前管理緊嘅呢個商店，設為全系統預設？\n\n所有新註冊嘅用戶將會套用呢個商店。')) return;
  try {
    await db.collection("system").doc("defaults").set({ rewards: adminSelectedUserRewards }, { merge: true });
    globalRewardsData = JSON.parse(JSON.stringify(adminSelectedUserRewards));
    showToast('✅ 成功更新系統預設商店！', 'success');
  } catch(e) { console.error(e); showToast('更新失敗，請檢查 Firebase 權限', 'error'); }
};

// --- 還原系統公版至 Hardcode 出廠設定 ---
window._adminResetGlobalDefaults = async () => {
  if(!confirm('⚠️ 警告：確定要將「全系統預設公版」徹底刪除？\n\n刪除後，系統會回復到代碼內最原始的 Hardcode 版本。\n(注意：現有用戶的個人設定不受影響)')) return;
  try {
    const btn = document.querySelector('button:active') || document.body;
    btn.style.opacity = '0.5';
    // 刪除 Firebase 入面嘅系統預設文件
    await db.collection("system").doc("defaults").delete();
    
    // 將本地變數還原做 Hardcode 嘅 default 變數
    globalExerciseData = JSON.parse(JSON.stringify(defaultExerciseData));
    globalRewardsData = JSON.parse(JSON.stringify(defaultRewards));
    
    btn.style.opacity = '1';
    showToast('✅ 系統公版已成功還原至出廠設定！', 'success');
  } catch(e) { 
    console.error(e); 
    showToast('還原失敗，請檢查權限', 'error'); 
  }
};
