  <script>
// ========== STATE ==========
let allRecords = [];
let currentPage = 'calendar';
let calYear, calMonth, selectedDate = null;
let filterExercise = '';
let editingRecord = null;
let historyEditMode = false;
let selectedRecords = new Set();
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();



// ========== EXERCISES DATA ==========
const defaultExerciseData = {
  strength: {
    label: '💪 力量', subcats: {
      '胸': ['啞鈴臥推','槓鈴臥推','上斜啞鈴臥推','飛鳥機','Cable 夾胸','掌上壓'],
      '背': ['引體向上','Cable 下拉','啞鈴划船','槓鈴划船','坐姿划船','T-Bar 划船'],
      '腿': ['深蹲','腿推機','哈克深蹲','腿伸展機','腿彎舉機','小腿提踵'],
      '肩': ['啞鈴肩推','槓鈴肩推','側平舉','前平舉','反向飛鳥','Face Pull'],
      '手臂': ['啞鈴二頭彎舉','Cable 二頭彎舉','三頭下壓','過頭三頭伸展','錘式彎舉']
    }
  },
  cardio: {
    label: '🏃 有氧', subcats: {
      '器械': ['跑步機','爬山機','太空漫步機','單車機','划船機'],
      '戶外': ['跳繩','行山','踩單車','跑步']
    }
  },
  hiit: { label: '🔥 HIIT', subcats: { 'HIIT': ['Tabata','AMRAP','EMOM','Circuit Training','Burpee Challenge'] }},
  functional: {
    label: '🧘 功能性', subcats: {
      '瑜伽': ['流瑜伽','陰瑜伽','力量瑜伽'],
      '徒手': ['Plank','山羊挺身','箱跳','波比跳','熊爬'],
      '拉伸': ['全身拉伸','上身拉伸','下身拉伸','髖關節活動']
    }
  }
};

// 這是會被動態修改的變量
let exerciseData = JSON.parse(JSON.stringify(defaultExerciseData));

// 新增：儲存自訂項目到 Firebase
async function saveCustomExercises() {
  if(!currentUser) return;
  try {
    await db.collection("users").doc(currentUser.uid).collection("settings").doc("preferences").set({
      exerciseData: exerciseData
    }, { merge: true });
    console.log("自訂項目已同步至 Firebase");
  } catch (e) {
    console.error("儲存失敗", e);
    showToast("同步失敗", "error");
  }
}


// Category colors for calendar dots
const catColors = { strength: '#3b82f6', cardio: '#22c55e', hiit: '#ef4444', functional: '#a855f7' };

// ========== REWARDS ==========
const defaultRewards = [
  { id:'r0', name:'測試獎勵', emoji:'🎲', cost:0, desc:'免費測試獎勵項目' },
  { id:'r1', name:'零食一份', emoji:'🍪', cost:30, desc:'辛苦咗，食個零食獎勵自己！' },
  { id:'r2', name:'珍珠奶茶', emoji:'🧋', cost:60, desc:'一杯奶茶嘅快樂～' },
  { id:'r3', name:'甜品', emoji:'🍰', cost:100, desc:'蛋糕時間到！' },
  { id:'r4', name:'日式拉麵', emoji:'🍜', cost:150, desc:'來一碗熱騰騰嘅拉麵！' }
];

let rewards = JSON.parse(JSON.stringify(defaultRewards));

// ========== POINTS CALCULATION ==========
function calcPoints(rec) {
  if(rec.record_type !== 'workout') return 0;
  const cat = rec.category;
  if(cat === 'strength') return Math.max(5, Math.round((rec.weight||0) * (rec.reps||0) * (rec.sets||1) / 50));
  if(cat === 'cardio') return Math.max(5, Math.round(parseDurationMin(rec.duration) * 1.5));
  if(cat === 'hiit') return Math.max(8, Math.round(parseDurationMin(rec.duration) * 2.5));
  if(cat === 'functional') return Math.max(5, Math.round((rec.sets||1) * (rec.reps||1) * 0.8));
  return 5;
}
function parseDurationMin(d) {
  if(!d) return 0;
  const p = d.split(':');
  return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60;
}

// 修改：支援 Admin 讀取及特別扣分/加分機制
function getTotalPoints(recordsArr = allRecords, rewardsArr = rewards) {
  let earned = 0, spent = 0;
  recordsArr.forEach(r => {
    // 運動得分，或 Admin 手動調整嘅分數
    if(r.record_type === 'workout' || r.record_type === 'point_adjustment') earned += (r.points || 0);
    // 換領扣分 (優先讀取記錄中寫死嘅 cost，防商店改價)
    if(r.record_type === 'redemption') spent += (r.cost !== undefined ? r.cost : (rewardsArr.find(rw=>rw.id===r.reward_id)?.cost || 0));
  });
  return { earned, spent, available: earned - spent };
}


// ========== FIREBASE INIT & LOGIN ==========
const firebaseConfig = {
  apiKey: "AIzaSyA_0phFVH-xuVud2TPUQ79-bUUweqQY6Ro",
  authDomain: "gymigogo.firebaseapp.com",
  projectId: "gymigogo",
  storageBucket: "gymigogo.firebasestorage.app",
  messagingSenderId: "458661529135",
  appId: "1:458661529135:web:b56abfe13097d3cbb728da"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let recordsUnsubscribe = null;

async function doLogin() {
  const nameInput = document.getElementById('nameInput');
  const pwdInput = document.getElementById('pwdInput');
  const userId = nameInput.value.trim();
  const password = pwdInput ? pwdInput.value : '';
  const errorMsg = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  
  if(!userId || !password) {
    errorMsg.textContent = '請輸入帳號同密碼';
    errorMsg.classList.remove('hidden');
    return;
  }
  errorMsg.classList.add('hidden');
  
  // 繼續保留無感登入嘅魔法：如果用家無打 @，自動補齊 @gymigogo.com
  const email = userId.includes('@') ? userId : `${userId.toLowerCase()}@gymigogo.com`;
  
  btn.disabled = true;
  btn.textContent = '驗證中...';

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (error) {
    console.error(error);
    if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
      showToast('帳號或密碼錯誤', 'error');
    } else {
      showToast('登入失敗，請檢查網絡連線', 'error');
    }
    btn.disabled = false;
    btn.textContent = '開始🚀';
  }
}

function doLogout() {
  auth.signOut();
}

// 監聽登入狀態變化 (取代舊的 showApp)
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    const displayId = user.displayName || user.email.split('@')[0];
    document.getElementById('userBadge').textContent = displayId;
    
    // --- 檢查是否 Admin，顯示按鈕 ---
    const isAdmin = user.email === 'adming@gymigogo.com';
    const navAdmin = document.getElementById('nav-admin');
    if(isAdmin) {
      navAdmin.classList.remove('hidden'); navAdmin.classList.add('flex');
    } else {
      navAdmin.classList.add('hidden'); navAdmin.classList.remove('flex');
    }

    // --- 儲存用戶資料俾 Admin 列表睇 ---
    db.collection("users").doc(user.uid).set({ displayId: displayId, email: user.email }, { merge: true });
    
    // --- 載入專屬自訂清單及專屬商店 ---
    db.collection("users").doc(user.uid).collection("settings").doc("preferences").get().then(doc => {
      if (doc.exists && doc.data().exerciseData) exerciseData = doc.data().exerciseData;
      else exerciseData = JSON.parse(JSON.stringify(defaultExerciseData));
    });

    db.collection("users").doc(user.uid).collection("settings").doc("rewards").get().then(doc => {
      if (doc.exists && doc.data().rewards) rewards = doc.data().rewards;
      else rewards = JSON.parse(JSON.stringify(defaultRewards));
      if(currentPage === 'shop') renderShop();
    });

    // 實時載入資料庫數據
    if(recordsUnsubscribe) recordsUnsubscribe();
    recordsUnsubscribe = db.collection("users").doc(user.uid).collection("records")
      .onSnapshot(snapshot => {
        allRecords = snapshot.docs.map(doc => ({ ...doc.data(), __backendId: doc.id }));
        document.getElementById('totalPoints').textContent = getTotalPoints().available;
        if(currentPage !== 'admin') renderCurrentPage();
      });

    switchPage('calendar');
    lucide.createIcons();
} else {
    currentUser = null;
    if(recordsUnsubscribe) { recordsUnsubscribe(); recordsUnsubscribe = null; }
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    
    // 登出後重設登入按鈕狀態，並清空密碼
    const loginBtn = document.getElementById('loginBtn');
    if(loginBtn) { 
      loginBtn.disabled = false; 
      loginBtn.textContent = '開始旅程 🚀'; 
    }
    const pwdInput = document.getElementById('pwdInput');
    if(pwdInput) pwdInput.value = '';
  }
});

// ========== NAVIGATION ==========
function switchPage(page) {
  currentPage = page;
  
  const pages = ['calendar','shop','history','settings', 'admin'];
  pages.forEach(p => {
    // 1. 處理頁面顯示/隱藏
    const pageEl = document.getElementById('page-'+p);
    if(pageEl) pageEl.classList.add('hidden');
    
    // 2. 處理導航按鈕樣式
    const navEl = document.getElementById('nav-'+p);
    if(navEl) {
      // 獲取目前的 isAdmin 狀態
      const isAdmin = currentUser && currentUser.email === 'adming@gymigogo.com';
      
      // 如果不是 Admin 且是管理按鈕，必須保持隱藏
      if (p === 'admin' && !isAdmin) {
        navEl.className = 'hidden flex-col items-center gap-0.5 px-4 py-1 rounded-xl transition-all tab-inactive';
      } else {
        // 根據是否選中，切換 active/inactive
        const isActive = (p === page);
        navEl.className = `flex flex-col items-center gap-0.5 px-4 py-1 rounded-xl transition-all ${isActive ? 'tab-active' : 'tab-inactive'}`;
      }
    }
  });

  const selectedPageEl = document.getElementById('page-'+page);
  if(selectedPageEl) selectedPageEl.classList.remove('hidden');
  
  renderCurrentPage();
  lucide.createIcons();
}

function renderCurrentPage() {
  if(currentPage === 'calendar') renderCalendar();
  else if(currentPage === 'shop') renderShop();
  else if(currentPage === 'history') renderHistory();
  else if(currentPage === 'settings') renderSettings();
  else if(currentPage === 'admin') renderAdmin(); // 👈 補上這這一行
}

// ========== TOAST ==========
function showToast(msg, type='success') {
  const colors = { success: 'bg-green-400 text-white', error: 'bg-red-400 text-white', info: 'bg-blue-400 text-white' };
  const t = document.createElement('div');
  t.className = `toast-msg ${colors[type]||colors.info}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ========== MODAL ==========
function showModal(html) {
  document.getElementById('modalContainer').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

// ========== CALENDAR PAGE ==========
let clipboardWorkout = null;
let clipboardMode = false;

function renderCalendar() {
  const el = document.getElementById('page-calendar');
  const workouts = allRecords.filter(r => r.record_type === 'workout');
  // Group by date
  const byDate = {};
  workouts.forEach(w => {
    if(!byDate[w.date]) byDate[w.date] = [];
    byDate[w.date].push(w);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

let calHtml = `<div class="flex items-center justify-between mb-3">
    <div class="flex gap-2">
      <button onclick="prevMonth()" class="p-2 rounded-xl bg-white shadow-sm hover:bg-sky2 transition"><i data-lucide="chevron-left" class="w-5 h-5 text-primary"></i></button>
      <button onclick="goToToday()" class="px-3 py-1 rounded-xl bg-white shadow-sm hover:bg-sky2 transition text-primary font-bold text-sm">今日</button>
    </div>
    <h2 class="font-extrabold text-lg text-primary">${calYear}年 ${monthNames[calMonth]}</h2>
    <button onclick="nextMonth()" class="p-2 rounded-xl bg-white shadow-sm hover:bg-sky2 transition"><i data-lucide="chevron-right" class="w-5 h-5 text-primary"></i></button>
  </div>`;

  calHtml += '<div class="grid grid-cols-7 gap-1 mb-1 text-center">';
  ['日','一','二','三','四','五','六'].forEach(d => calHtml += `<div class="text-xs font-bold text-slate-400">${d}</div>`);
  calHtml += '</div><div class="grid grid-cols-7 gap-1">';

  for(let i=0; i<firstDay; i++) calHtml += '<div></div>';
  for(let d=1; d<=daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayWorkouts = byDate[dateStr] || [];
    const isToday = dateStr === toDateStr(new Date());
    const isSelected = dateStr === selectedDate;
    const hasFW = dayWorkouts.length > 0;

    // Get category tags with colors
    let allTags = [];
    if(dayWorkouts.length > 0) {
      const cats = [...new Set(dayWorkouts.map(w=>w.category))];
      cats.forEach(cat => {
        if(cat === 'strength') {
          const subcats = [...new Set(dayWorkouts.filter(w=>w.category==='strength').map(w=>{
            const ex = w.exercise;
            for(const [sc, items] of Object.entries(exerciseData.strength.subcats)) {
              if(items.includes(ex)) return sc;
            }
            return '';
          }).filter(Boolean))];
          const subcatColors = { '胸': 'bg-red-100 text-red-700', '背': 'bg-cyan-100 text-cyan-700', '腿': 'bg-green-100 text-green-700', '肩': 'bg-yellow-100 text-yellow-700', '手臂': 'bg-purple-100 text-purple-700' };
          subcats.forEach(sc => {
            allTags.push(`<span class="text-[10px] font-bold ${subcatColors[sc]||'bg-blue-100 text-blue-700'} px-0.5 py-0.5 rounded-full whitespace-nowrap flex-shrink-0">${sc}</span>`);
          });
        } else {
          const labels = { cardio: '有氧', hiit: 'HIIT', functional: '功能性' };
          const colors = { cardio: 'bg-orange-100 text-orange-700', hiit: 'bg-pink-100 text-pink-700', functional: 'bg-indigo-100 text-indigo-700' };
          allTags.push(`<span class="text-[10px] font-bold ${colors[cat]||'bg-slate-100 text-slate-700'} px-0.5 py-0.5 rounded-full whitespace-nowrap flex-shrink-0">${labels[cat]||cat}</span>`);
        }
      });
    }

    // Dynamically fit tags based on available space
    // Create a temporary container to measure actual width
    let tagHtml = '';
    let totalWidth = 0;
    const maxWidth = 135; // Approximate width of cell - padding
    let displayCount = 0;
    
    for(let i = 0; i < allTags.length; i++) {
      // Each tag is roughly 24-28px wide, gap is 4px
      const tagWidth = 26 + 4;
      if(totalWidth + tagWidth > maxWidth && displayCount > 0) break;
      tagHtml += allTags[i];
      totalWidth += tagWidth;
      displayCount++;
    }
    
    const hiddenCount = allTags.length - displayCount;
    if(hiddenCount > 0) {
      tagHtml += `<span class="text-[10px] font-bold bg-slate-200 text-slate-600 px-1 py-0.5 rounded-full flex-shrink-0">+${hiddenCount}</span>`;
    }

    calHtml += `<button onclick="selectDate('${dateStr}')" oncontextmenu="return false;" class="rounded-xl p-1 h-20 flex flex-col items-start justify-start transition-all overflow-hidden ${isSelected?'bg-[#70a7ff] text-white shadow-md':isToday?'bg-sky2 ring-2 ring-primary':'bg-white hover:bg-[#f2faff]'} ${hasFW?'ring-1 ring-sky3':''} ${clipboardMode?'ring-1 ring-green-400 cursor-copy':''}">
      <span class="text-xs font-bold ${isSelected?'text-white':isToday?'text-primary':'text-slate-700'}">${d}</span>
      <div class="flex flex-wrap gap-0.5 mt-0.5 w-full overflow-hidden flex-1 content-start">${tagHtml}</div>
    </button>`;
  }
  calHtml += '</div>';

  // Selected date detail
  let detailHtml = '';
  if(selectedDate) {
    const dayW = byDate[selectedDate]||[];
    detailHtml = `<div class="mt-4 bg-white rounded-2xl shadow-sm p-4 card-enter">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-primary text-lg">${selectedDate}</h3>
        <div class="flex gap-2">
          <button onclick="openAddWorkout('${selectedDate}')" class="bg-primary text-white px-3 py-1.5 rounded-xl text-sm font-bold flex items-center gap-1 hover:bg-primaryDk transition">
            <i data-lucide="plus" class="w-4 h-4"></i> 新增
          </button>
          ${clipboardMode ? `<button onclick="cancelClipboard()" class="bg-slate-200 text-slate-600 px-3 py-1.5 rounded-xl text-sm font-bold hover:bg-slate-300 transition">取消複製</button>` : ''}
        </div>
      </div>`;
    if(dayW.length === 0) {
      detailHtml += '<p class="text-slate-400 text-sm text-center py-6">呢日冇訓練記錄 📝</p>';
    } else {
      // Group by category
      const byCategory = {};
      dayW.forEach(w => {
        if(!byCategory[w.category]) byCategory[w.category] = [];
        byCategory[w.category].push(w);
      });

      // Sort categories
      const catOrder = ['strength', 'cardio', 'hiit', 'functional'];
      catOrder.forEach(cat => {
        if(!byCategory[cat]) return;
        const items = byCategory[cat];
        const catLabel = { strength: '💪 力量', cardio: '🏃 有氧', hiit: '🔥 HIIT', functional: '🧘 功能性' }[cat];
        detailHtml += `<div class="mb-3"><div class="text-xs font-bold text-slate-400 mb-1.5">${catLabel}</div>`;

        items.forEach(w => {
          let subcatDisplay = '';
          let cardBgClass = 'bg-sky1 hover:bg-sky2';
          let textColorClass = 'text-slate-900';
          
          if(w.category === 'strength') {
            for(const [sc, exList] of Object.entries(exerciseData.strength.subcats)) {
              if(exList.includes(w.exercise)) {
                const subcatColors = { '胸': 'bg-red-100 text-red-700', '背': 'bg-cyan-100 text-cyan-700', '腿': 'bg-green-100 text-green-700', '肩': 'bg-yellow-100 text-yellow-700', '手臂': 'bg-purple-100 text-purple-700' };
                subcatDisplay = `<span class="text-xs font-semibold ${subcatColors[sc]||'bg-blue-100 text-blue-700'} px-2 py-0.5 rounded-full">${sc}</span>`;
                break;
              }
            }
          } else if(w.category === 'cardio') {
            cardBgClass = 'bg-orange-100 hover:bg-orange-200';
            textColorClass = 'text-orange-900';
          } else if(w.category === 'hiit') {
            cardBgClass = 'bg-pink-100 hover:bg-pink-200';
            textColorClass = 'text-pink-900';
          } else if(w.category === 'functional') {
            cardBgClass = 'bg-indigo-100 hover:bg-indigo-200';
            textColorClass = 'text-indigo-900';
          }
          
          let linkBtnHtml = '';
          if (['cardio', 'hiit', 'functional'].includes(w.category) && w.link) {
            let safeLink = w.link.trim();
            if(safeLink && !safeLink.startsWith('http')) safeLink = 'https://' + safeLink;
            linkBtnHtml = `<a href="${safeLink}" target="_blank" onclick="event.stopPropagation()" class="inline-flex items-center gap-1 text-[11px] font-bold bg-white/60 text-slate-700 px-2 py-0.5 rounded-lg hover:bg-white hover:text-primary transition shadow-sm border border-slate-200">
              <i data-lucide="external-link" class="w-3 h-3"></i> 影片
            </a>`;
          }

        detailHtml += `<div class="w-full text-left ${cardBgClass} rounded-xl p-3 mb-2 flex items-start justify-between transition-colors ${textColorClass}">
            <button 
              ontouchstart="window.handlePressStart(event, '${w.__backendId}')" 
              ontouchend="window.handlePressEnd()" 
              ontouchmove="window.handlePressEnd()" 
              onmousedown="window.handlePressStart(event, '${w.__backendId}')" 
              onmouseup="window.handlePressEnd()" 
              onmouseleave="window.handlePressEnd()" 
              onclick="window.handleRecordClick(event, '${w.__backendId}')" 
              oncontextmenu="event.preventDefault();" 
              class="flex-1 flex items-start gap-2 border-none bg-none cursor-pointer text-left select-none" 
              style="-webkit-touch-callout: none;">              
              
    ${subcatDisplay ? `<div class="flex-shrink-0 mt-0.5">${subcatDisplay}</div>` : ''}
              <div class="flex-1">
                <div class="font-bold text-sm">${w.exercise}</div>
                <div class="text-xs opacity-75 mt-1">${formatWorkoutDetail(w)}</div>
              </div>
            </button>
            <div class="flex items-center gap-1.5 flex-shrink-0 ml-2">
              ${linkBtnHtml}
              <span class="text-xs font-bold text-warm3 bg-warm1 px-2 py-0.5 rounded-full whitespace-nowrap">+${w.points}⭐</span>
            </div>
          </div>`;
        });
        detailHtml += '</div>';
      });
    }
    detailHtml += '</div>';
  }

  el.innerHTML = calHtml + detailHtml;
  lucide.createIcons();
}

function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} selectedDate=null; renderCalendar(); }
function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} selectedDate=null; renderCalendar(); }
// 新增：返去今日嘅功能
function goToToday() {
  const d = new Date();
  calYear = d.getFullYear();
  calMonth = d.getMonth();
  selectedDate = toDateStr(d); // 自動揀埋今日，顯示今日嘅詳情
  renderCalendar();
}

function selectDate(d) { 
  if(clipboardMode && clipboardWorkout) {
    pasteWorkout(d);
    return;
  }
  selectedDate = selectedDate===d ? null : d; 
  renderCalendar(); 
}

function formatWorkoutDetail(w) {
  if(w.category==='strength') return `${w.sets||1} 組 × ${w.reps||0} 次 @ ${w.weight||0}kg`;
  if(w.category==='cardio') {
    let s = w.duration||'0:00';
    if(w.distance) s += ` | ${w.distance}km`;
    if(w.level) s += ` | Lv.${w.level}`;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
  if(w.category==='hiit') {
    let s = w.duration||'0:00';
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
  if(w.category==='functional') {
    let s = `${w.sets||1} 組 × ${w.reps||0} 次`;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
  return '';
}

// ========== CLIPBOARD FUNCTIONS ==========
let pressTimer = null;
let isLongPress = false;

window.handlePressStart = (e, backendId) => {
  isLongPress = false;
  if (pressTimer) clearTimeout(pressTimer);
  pressTimer = setTimeout(() => {
    isLongPress = true;
    // 觸發微震動回饋 (如果手機支援)
    if (navigator.vibrate) navigator.vibrate(50);
    showWorkoutMenu(e, backendId);
  }, 600); // 600毫秒當作長按
};

window.handlePressEnd = () => {
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
};

window.handleRecordClick = (e, backendId) => {
  if (isLongPress) {
    e.preventDefault();
    e.stopPropagation();
    return; // 如果係長按，就唔好觸發編輯
  }
  editRecord(backendId);
};

function showWorkoutMenu(e, backendId) {
  e.preventDefault();
  e.stopPropagation();
  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) return;

  showModal(`<div class="modal-box" onclick="event.stopPropagation()">
    <h3 class="font-bold text-lg text-primary mb-4 text-center">${rec.exercise}</h3>
    <div class="space-y-2">
      <button onclick="copyWorkout('${backendId}')" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
        <i data-lucide="copy" class="w-5 h-5"></i> 複製
      </button>
      <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-200 transition">取消</button>
    </div>
  </div>`);
  lucide.createIcons();
}

function copyWorkout(backendId) {
  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) return;
  
  clipboardWorkout = rec;
  clipboardMode = true;
  closeModal();
  showToast('已複製！按日曆日子粘貼', 'success');
  renderCalendar();
}

function cancelClipboard() {
  clipboardMode = false;
  clipboardWorkout = null;
  showToast('已取消複製', 'info');
  renderCalendar();
}

async function pasteWorkout(dateStr) {
  if(!clipboardWorkout) return;
  
  const btn = document.querySelector('button:hover') || document.body;
  if(btn) btn.style.opacity = '0.7';

  if(allRecords.filter(r=>r.record_type==='workout').length >= 999) {
    showToast('已達記錄上限 (999)！', 'error');
    if(btn) btn.style.opacity = '1';
    return;
  }

  // Create new record without backend ID
  const newRec = {
    record_type: 'workout',
    date: dateStr,
    category: clipboardWorkout.category,
    exercise: clipboardWorkout.exercise,
    weight: clipboardWorkout.weight || 0,
    reps: clipboardWorkout.reps || 0,
    sets: clipboardWorkout.sets || 1,
    duration: clipboardWorkout.duration || '',
    distance: clipboardWorkout.distance || 0,
    level: clipboardWorkout.level || 0,
    notes: clipboardWorkout.notes || '',
    points: clipboardWorkout.points || 0,
    reward_id: '',
    used: false,
redeemed_at: '',
    user_name: currentUser ? (currentUser.displayName || currentUser.email.split('@')[0]) : '',
    font_size: 0
  };

await db.collection("users").doc(currentUser.uid).collection("records").add(newRec);
const result = { isOk: true }; 
  if(btn) btn.style.opacity = '1';
  
  if(result.isOk) {
    showToast(`已粘貼到 ${dateStr}！`, 'success');
    clipboardMode = false;
    clipboardWorkout = null;
    selectedDate = dateStr;
    renderCalendar();
  } else {
    showToast('粘貼失敗，請重試', 'error');
  }
}

// ========== ADD WORKOUT ==========
function openAddWorkout(date) {
  let selCat = 'strength', selSubcat = '', selExercise = '';
  let isExEditMode = false; // 追蹤是否正在編輯清單

  // 切換編輯模式
  window._toggleExEdit = () => { isExEditMode = !isExEditMode; renderAdd(); };
  
  // 刪除項目
  window._deleteEx = (ex) => {
    if(!confirm(`確定要刪除「${ex}」？`)) return;
    exerciseData[selCat].subcats[selSubcat] = exerciseData[selCat].subcats[selSubcat].filter(e => e !== ex);
    if(selExercise === ex) selExercise = '';
    saveCustomExercises(); // 同步到 Firebase
    renderAdd();
  };
  
  // 新增項目
  window._addNewEx = () => {
    const name = prompt('請輸入新動作名稱：');
    if(!name || !name.trim()) return;
    const trimmed = name.trim();
    if(exerciseData[selCat].subcats[selSubcat].includes(trimmed)) { showToast('項目已存在', 'error'); return; }
    exerciseData[selCat].subcats[selSubcat].push(trimmed);
    selExercise = trimmed;
    saveCustomExercises(); // 同步到 Firebase
    renderAdd();
  };

  function renderAdd() {
    const catData = exerciseData[selCat];
    const subcats = Object.keys(catData.subcats);
    if(!selSubcat || !catData.subcats[selSubcat]) selSubcat = subcats[0];
    const exercises = catData.subcats[selSubcat];
    if(!selExercise || !exercises.includes(selExercise)) selExercise = '';

    let html = `<div class="modal-box max-w-md" onclick="event.stopPropagation()" style="max-height:90%; overflow-y:auto;">
      <h3 class="font-extrabold text-lg text-primary mb-3">📝 新增訓練 - ${date}</h3>
      
      <div class="flex gap-2 overflow-x-auto pb-2 mb-3">`;
// 1. 強制主分類排序
    const mainCatOrder = ['strength', 'cardio', 'hiit', 'functional'];
    mainCatOrder.forEach(k => {
      const v = exerciseData[k];
      if(!v) return;
      const catColors = { strength: 'bg-sky1 text-blue-700 hover:bg-sky2', cardio: 'bg-orange-100 text-orange-700 hover:bg-orange-200', hiit: 'bg-pink-100 text-pink-700 hover:bg-pink-200', functional: 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200' };
      const selectedStyle = selCat===k ? { strength: 'bg-blue-300 text-blue-900', cardio: 'bg-orange-300 text-orange-900', hiit: 'bg-pink-300 text-pink-900', functional: 'bg-indigo-300 text-indigo-900' }[k] : '';
      html += `<button class="seg-btn ${selCat===k?selectedStyle:catColors[k]}" onclick="event.stopPropagation();window._addCat='${k}';window._rerenderAdd()">${v.label}</button>`;
    });

    html += `</div>
      <div class="flex gap-2 overflow-x-auto pb-2 mb-3">`;
      
    // 2. 強制次分類排序
    const subcatOrder = ['胸','背','腿','肩','手臂','器械','戶外','HIIT','瑜伽','徒手','拉伸'];
    subcats.sort((a, b) => {
      let idxA = subcatOrder.indexOf(a);
      let idxB = subcatOrder.indexOf(b);
      if(idxA === -1) idxA = 999; // 新自訂嘅分類排最後
      if(idxB === -1) idxB = 999;
      return idxA - idxB;
    });

    // 3. 補回次分類專屬顏色
    subcats.forEach(sc => {
      const subcatColors = { '胸': 'bg-red-100 text-red-700 hover:bg-red-200', '背': 'bg-cyan-100 text-cyan-700 hover:bg-cyan-200', '腿': 'bg-green-100 text-green-700 hover:bg-green-200', '肩': 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200', '手臂': 'bg-purple-100 text-purple-700 hover:bg-purple-200', '器械': 'bg-orange-100 text-orange-700 hover:bg-orange-200', '戶外': 'bg-orange-100 text-orange-700 hover:bg-orange-200', 'HIIT': 'bg-pink-100 text-pink-700 hover:bg-pink-200', '瑜伽': 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200', '徒手': 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200', '拉伸': 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200' };
      const selectedStyles = { '胸': 'bg-red-300 text-red-900', '背': 'bg-cyan-300 text-cyan-900', '腿': 'bg-green-300 text-green-900', '肩': 'bg-yellow-300 text-yellow-900', '手臂': 'bg-purple-300 text-purple-900', '器械': 'bg-orange-300 text-orange-900', '戶外': 'bg-orange-300 text-orange-900', 'HIIT': 'bg-pink-300 text-pink-900', '瑜伽': 'bg-indigo-300 text-indigo-900', '徒手': 'bg-indigo-300 text-indigo-900', '拉伸': 'bg-indigo-300 text-indigo-900' };
      
      const sStyle = selectedStyles[sc] || 'bg-slate-400 text-white'; // 搵唔到顏色就用灰色
      const cColor = subcatColors[sc] || 'bg-slate-100 text-slate-700 hover:bg-slate-200';
      
      html += `<button class="seg-btn text-xs ${selSubcat===sc?sStyle:cColor}" onclick="event.stopPropagation();window._addSubcat='${sc}';window._rerenderAdd()">${sc}</button>`;
    });
    
    html += `</div>
      
      <div class="flex justify-between items-center mb-2 px-1">
        <span class="text-xs font-bold text-slate-400">選擇動作</span>
        <button class="text-[10px] font-bold px-2 py-1 rounded transition-colors ${isExEditMode?'bg-primary text-white':'bg-slate-200 text-slate-600'}" onclick="event.stopPropagation();window._toggleExEdit()">
          ${isExEditMode ? '完成' : '✏️ 自訂'}
        </button>
</div>`;

    html += `<div class="grid grid-cols-2 gap-2 mb-3 max-h-32 overflow-y-auto p-1">`;
    
    exercises.forEach(ex => {
      if(isExEditMode) {
        html += `<div class="relative flex">
          <button class="flex-1 text-left px-3 py-2 rounded-xl text-sm font-semibold bg-sky1 text-slate-400 cursor-default">${ex}</button>
          <button class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] shadow-md" onclick="event.stopPropagation();window._deleteEx('${ex.replace(/'/g,"\\'")}')">✕</button>
        </div>`;
      } else {
        html += `<button class="text-left px-3 py-2 rounded-xl text-sm font-semibold transition-all ${selExercise===ex?'bg-blue-400 text-blue-900 font-extrabold':'bg-sky1 text-slate-700 hover:bg-sky2'}" onclick="event.stopPropagation();window._addEx='${ex.replace(/'/g,"\\'")}';window._rerenderAdd()">${ex}</button>`;
      }
    });

    if(isExEditMode) {
      html += `<button class="border-2 border-dashed border-sky3 text-primary rounded-xl text-sm font-bold flex items-center justify-center py-1.5" onclick="event.stopPropagation();window._addNewEx()">➕ 新增項目</button>`;
    }
    html += '</div>';

    // Input fields based on category
    if(selExercise) {
      html += '<div class="space-y-3 mt-3 text-left">';
      if(selCat === 'strength') {
        html += inputField('weight', '重量 (kg)', 'number', '', 'e.g. 40');
        html += inputField('reps', '次數 (Reps)', 'number', '', 'e.g. 12');
        html += inputField('sets', '組數 (Sets)', 'number', '', 'e.g. 3');
      } else if(selCat === 'cardio') {
        html += inputField('duration', '時間 (分:秒)', 'text', '', 'e.g. 30:00');
        const isOutdoor = exerciseData.cardio.subcats['戶外']?.includes(selExercise);
        if(!isOutdoor) {
          html += inputField('distance', '距離 (km)', 'number', '', 'e.g. 5');
          html += inputField('level', '阻力等級', 'number', '', 'e.g. 8');
        }
        html += inputField('notes', '備註', 'text', '', '');
        html += inputField('link', '連結 (如 YouTube)', 'text', '', 'https://...');
      } else if(selCat === 'hiit') {
        html += inputField('duration', '時間 (分:秒)', 'text', '', 'e.g. 20:00');
        html += inputField('notes', '備註', 'text', '', '');
        html += inputField('link', '連結 (如 YouTube)', 'text', '', 'https://...');
      } else if(selCat === 'functional') {
        html += inputField('sets', '組數 (Sets)', 'number', '', 'e.g. 3');
        html += inputField('reps', '次數 (Reps)', 'number', '', 'e.g. 15');
        html += inputField('notes', '備註', 'text', '', '');
        html += inputField('link', '連結 (如 YouTube)', 'text', '', 'https://...');
      }
      html += `</div>
        <button onclick="submitWorkout('${date}','${selCat}','${selExercise.replace(/'/g,"\\'")}')" id="submitWorkoutBtn" class="w-full mt-4 bg-primary hover:bg-primaryDk text-white font-bold py-3 rounded-xl transition">
          儲存 ✅
        </button>`;
    }

    html += `<button onclick="closeModal()" class="w-full mt-2 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-200 transition">取消</button></div>`;
    showModal(html);
    lucide.createIcons();
  }

  window._rerenderAdd = () => {
    if(window._addCat) { selCat = window._addCat; selSubcat=''; selExercise=''; window._addCat=null; }
    if(window._addSubcat) { selSubcat = window._addSubcat; selExercise=''; window._addSubcat=null; }
    if(window._addEx) { selExercise = window._addEx; window._addEx=null; }
    renderAdd();
  };
  renderAdd();
}

function inputField(id, label, type, val, ph) {
  return `<div><label class="text-xs font-bold text-slate-500 block mb-1">${label}</label>
    <input id="add_${id}" type="${type}" value="${val}" placeholder="${ph}" step="${type==='number'?'any':''}" class="w-full border-2 border-sky2 rounded-xl px-3 py-2.5 focus:border-primary focus:outline-none transition font-semibold"></div>`;
}

async function submitWorkout(date, cat, exercise) {
  const btn = document.getElementById('submitWorkoutBtn');
  if(btn) { btn.disabled = true; btn.textContent = '儲存中...'; }

  if(allRecords.filter(r=>r.record_type==='workout').length >= 9999) {
    showToast('已達記錄上限 (9999)！請刪除一些舊記錄', 'error');
    if(btn) { btn.disabled = false; btn.textContent = '儲存 ✅'; }
    return;
  }

  const gv = id => { const e = document.getElementById('add_'+id); return e ? e.value : ''; };
  const rec = {
    record_type: 'workout', date, category: cat, exercise,

    // Group by date
    const grouped = {};
    workouts.forEach(w => {
      if(!grouped[w.date]) grouped[w.date] = [];
      grouped[w.date].push(w);
    });
    Object.entries(grouped).forEach(([date, items]) => {
      html += `<div class="mb-4 bg-white rounded-2xl shadow-sm p-4 card-enter"><div class="text-xs font-bold text-slate-400 mb-3">${date}</div>`;
      
      // Group by category within each date
      const byCategory = {};
      items.forEach(w => {
        if(!byCategory[w.category]) byCategory[w.category] = [];
        byCategory[w.category].push(w);
      });

      // Sort categories
      const catOrder = ['strength', 'cardio', 'hiit', 'functional'];
      catOrder.forEach(cat => {
        if(!byCategory[cat]) return;
        const catItems = byCategory[cat];
        const catLabel = { strength: '💪 力量', cardio: '🏃 有氧', hiit: '🔥 HIIT', functional: '🧘 功能性' }[cat];
        html += `<div class="mb-3"><div class="text-xs font-bold text-slate-400 mb-1.5">${catLabel}</div>`;

        catItems.forEach(w => {
          let subcatDisplay = '';
          let cardBgClass = 'bg-sky1 hover:bg-sky2';
          let textColorClass = 'text-slate-900';
          
          if(w.category === 'strength') {
            for(const [sc, exList] of Object.entries(exerciseData.strength.subcats)) {
              if(exList.includes(w.exercise)) {
                const subcatColors = { '胸': 'bg-red-100 text-red-700', '背': 'bg-cyan-100 text-cyan-700', '腿': 'bg-green-100 text-green-700', '肩': 'bg-yellow-100 text-yellow-700', '手臂': 'bg-purple-100 text-purple-700' };
                subcatDisplay = `<span class="text-xs font-semibold ${subcatColors[sc]||'bg-blue-100 text-blue-700'} px-2 py-0.5 rounded-full flex-shrink-0">${sc}</span>`;
                break;
              }
            }
          } else if(w.category === 'cardio') {
            cardBgClass = 'bg-orange-100 hover:bg-orange-200';
            textColorClass = 'text-orange-900';
          } else if(w.category === 'hiit') {
            cardBgClass = 'bg-pink-100 hover:bg-pink-200';
            textColorClass = 'text-pink-900';
          } else if(w.category === 'functional') {
            cardBgClass = 'bg-indigo-100 hover:bg-indigo-200';
            textColorClass = 'text-indigo-900';
          }
          
  const isSelected = selectedRecords.has(w.__backendId);
          
          let linkBtnHtml = '';
          if (['cardio', 'hiit', 'functional'].includes(w.category) && w.link) {
            let safeLink = w.link.trim();
            if(safeLink && !safeLink.startsWith('http')) safeLink = 'https://' + safeLink;
            linkBtnHtml = `<a href="${safeLink}" target="_blank" onclick="event.stopPropagation()" class="inline-flex items-center gap-1 text-[11px] font-bold bg-white/60 text-slate-700 px-2 py-0.5 rounded-lg hover:bg-white hover:text-primary transition shadow-sm border border-slate-200">
              <i data-lucide="external-link" class="w-3 h-3"></i> 影片
            </a>`;
          }

          html += `<div class="w-full text-left ${cardBgClass} rounded-xl p-3 mb-2 flex items-start justify-between transition-all ${textColorClass} ${isSelected?'ring-4 ring-blue-500':''}${historyEditMode?'':' hover:shadow-md'}" onclick="${historyEditMode?`event.stopPropagation();toggleRecordSelect('${w.__backendId}')`:''}" style="cursor:${historyEditMode?'pointer':'default'}">

              ${linkBtnHtml}

            </div>
          </div>`;
        });
        html += '</div>';
      });
      
      html += '</div>';
    });
  }
  el.innerHTML = html;
  lucide.createIcons();
}

    html += inputField('edit_reps', '次數', 'number', rec.reps, '');
    html += inputField('edit_notes', '備註', 'text', rec.notes||'', '');
    html += inputField('edit_link', '連結', 'text', rec.link||'', '');
  }

  html += `</div>
    <button id="saveEditBtn" onclick="saveEdit('${backendId}')" class="w-full mt-4 bg-primary hover:bg-primaryDk text-white font-bold py-3 rounded-xl transition">儲存修改 ✅</button>

    <button onclick="closeModal()" class="w-full mt-2 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-200 transition">取消</button>
  </div>`;
  showModal(html);

  // Set values after render
  setTimeout(() => {
    const setV = (id,v) => { const e=document.getElementById(id); if(e) e.value=v; };
    setV('add_edit_weight', rec.weight); setV('add_edit_reps', rec.reps); setV('add_edit_sets', rec.sets);
    setV('add_edit_duration', rec.duration); setV('add_edit_distance', rec.distance);
    setV('add_edit_level', rec.level); setV('add_edit_notes', rec.notes); setV('add_edit_link', rec.link);
  }, 50);
}

async function saveEdit(backendId) {
  const btn = document.getElementById('saveEditBtn');
  if(btn) { btn.disabled = true; btn.textContent = '儲存中...'; }

  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) { closeModal(); return; }

  const gv = id => { const e = document.getElementById('add_edit_'+id); return e ? e.value : ''; };
  const updated = {...rec,
    weight: parseFloat(gv('weight'))||0, reps: parseInt(gv('reps'))||0, sets: parseInt(gv('sets'))||1,
    duration: gv('duration')||rec.duration, distance: parseFloat(gv('distance'))||0,
    level: parseInt(gv('level'))||0, notes: gv('notes')||'', link: gv('link')||'' // 👈 新增 link
  };
  updated.points = calcPoints(updated);

  await db.collection("users").doc(currentUser.uid).collection("records").doc(backendId).update(updated);
  const result = { isOk: true };
  closeModal();
  if(result.isOk) showToast('已更新！', 'success');
  else showToast('更新失敗', 'error');
}

  const toDelete = isReset ? [...allRecords] : allRecords.filter(r=>r.record_type==='workout');

await db.collection("users").doc(currentUser.uid).collection("records").doc(r.__backendId).delete();  }

window._adminNewReward = () => {
  const name = prompt('獎勵名稱 (例如: 咖啡):'); if(!name) return;
  const emoji = prompt('Emoji (例如: ☕):') || '🎁';
  const cost = parseInt(prompt('所需積分 (例如: 50):')); if(isNaN(cost)) return;
  adminSelectedUserRewards.push({ id: 'r'+Date.now(), name, emoji, cost, desc: '管理員自訂獎勵' });
  adminSaveRewardsToDB();
};

window._adminEditReward = (id) => {
  const rw = adminSelectedUserRewards.find(r => r.id === id);
  if(!rw) return;
  const newName = prompt('修改獎勵名稱:', rw.name);
  if(!newName || !newName.trim()) return;
  const newEmoji = prompt('修改 Emoji:', rw.emoji) || '🎁';
  const costStr = prompt('修改所需積分:', rw.cost);
  if(costStr === null) return;
  const newCost = parseInt(costStr);
  if(isNaN(newCost)) return;

  rw.name = newName.trim();
  rw.emoji = newEmoji;
  rw.cost = newCost;
  adminSaveRewardsToDB();
};

window._adminDeleteReward = (id) => {
  if(!confirm('確定刪除此獎勵？')) return;
  adminSelectedUserRewards = adminSelectedUserRewards.filter(r => r.id !== id);
  adminSaveRewardsToDB();
};

        onEnd: function (evt) {
          // 抽出嚟再插入新位
          const draggedItem = adminSelectedUserRewards.splice(evt.oldIndex, 1)[0];
          adminSelectedUserRewards.splice(evt.newIndex, 0, draggedItem);
          adminSaveRewardsToDB(false); // 畫面已經自動排好，背後靜靜 Save 就可以，唔會閃爍
        }
      });
    }
    lucide.createIcons();
  }, 50);
}

// -- Admin: 換領券及歷史 --
function adminViewVouchersModal() {
  const reds = adminSelectedUserRecs.filter(r => r.record_type === 'redemption').sort((a,b) => b.redeemed_at.localeCompare(a.redeemed_at));
  let html = `<div class="modal-box max-w-md text-left" onclick="event.stopPropagation()" style="max-height:85%;overflow-y:auto;">
    <h3 class="font-extrabold text-lg text-primary mb-3">🎫 換領歷史及票券</h3>`;
  if(reds.length===0) html += `<p class="text-center text-slate-400 py-4">無記錄</p>`;
  reds.forEach(r => {
    const isUsed = r.used;
    const rwName = r.name || '已下架獎勵'; const rwEmoji = r.emoji || '🎁';
    const dateStr = new Date(r.redeemed_at).toLocaleDateString('zh-HK');
    html += `<div class="${isUsed?'bg-slate-100':'bg-green-100 border border-green-300'} rounded-xl p-3 mb-2 flex justify-between items-center">
      <div>
        <div class="font-bold text-sm flex items-center gap-1"><span class="text-lg">${rwEmoji}</span> ${rwName}</div>
        <div class="text-[10px] text-slate-500 mt-1">換領於: ${dateStr}</div>
      </div>
      <span class="text-xs font-bold px-2 py-1 rounded-full ${isUsed?'bg-slate-200 text-slate-500':'bg-green-500 text-white'}">${isUsed?'已使用':'未使用'}</span>
    </div>`;
  });
  html += `<button onclick="closeModal()" class="w-full mt-4 bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-200 transition">關閉</button></div>`;
  showModal(html);
}

// Apply saved font size
const savedFontSize = parseInt(localStorage.getItem('gq_fontsize'))||16;
document.body.style.fontSize = savedFontSize + 'px';

lucide.createIcons();
</script>
</body>
</html>
